<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - SynergyAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .toggle-form a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>SynergyAI</h1>
            <p>多智能体协作系统</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <!-- 登录表单 -->
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="请输入用户名"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="请输入密码"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="btn" id="loginBtn">
                <span id="loginBtnText">登录</span>
            </button>
        </form>

        <!-- 注册表单 -->
        <form id="registerForm" class="hidden">
            <div class="form-group">
                <label for="reg_username">用户名</label>
                <input
                    type="text"
                    id="reg_username"
                    name="username"
                    placeholder="3-50个字符"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="reg_email">邮箱</label>
                <input
                    type="email"
                    id="reg_email"
                    name="email"
                    placeholder="请输入邮箱"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="reg_password">密码</label>
                <input
                    type="password"
                    id="reg_password"
                    name="password"
                    placeholder="至少6个字符"
                    required
                    autocomplete="new-password"
                >
            </div>

            <div class="form-group">
                <label for="reg_password_confirm">确认密码</label>
                <input
                    type="password"
                    id="reg_password_confirm"
                    name="password_confirm"
                    placeholder="再次输入密码"
                    required
                    autocomplete="new-password"
                >
            </div>

            <button type="submit" class="btn" id="registerBtn">
                <span id="registerBtnText">注册</span>
            </button>
        </form>

        <div class="toggle-form">
            <span id="toggleText">还没有账号？</span>
            <a href="#" id="toggleForm">立即注册</a>
        </div>

        <div class="footer">
            <a href="/">返回首页</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const toggleForm = document.getElementById('toggleForm');
        const toggleText = document.getElementById('toggleText');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        let isLoginMode = true;

        // 切换登录/注册表单
        toggleForm.addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;

            if (isLoginMode) {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                toggleText.textContent = '还没有账号？';
                toggleForm.textContent = '立即注册';
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                toggleText.textContent = '已有账号？';
                toggleForm.textContent = '立即登录';
            }

            hideMessages();
        });

        // 显示错误消息
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }

        // 显示成功消息
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        // 隐藏消息
        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        // 设置按钮加载状态
        function setButtonLoading(btnId, textId, loading) {
            const btn = document.getElementById(btnId);
            const text = document.getElementById(textId);

            if (loading) {
                btn.disabled = true;
                text.innerHTML = '<span class="loading"></span>处理中...';
            } else {
                btn.disabled = false;
                text.textContent = isLoginMode ? '登录' : '注册';
            }
        }

        // 登录
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('请填写所有字段');
                return;
            }

            setButtonLoading('loginBtn', 'loginBtnText', true);

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // 保存 token
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    showSuccess('登录成功！正在跳转...');

                    // 跳转到首页
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showError(data.detail || '登录失败');
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                console.error('Login error:', error);
            } finally {
                setButtonLoading('loginBtn', 'loginBtnText', false);
            }
        });

        // 注册
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const username = document.getElementById('reg_username').value.trim();
            const email = document.getElementById('reg_email').value.trim();
            const password = document.getElementById('reg_password').value;
            const passwordConfirm = document.getElementById('reg_password_confirm').value;

            if (!username || !email || !password || !passwordConfirm) {
                showError('请填写所有字段');
                return;
            }

            if (password !== passwordConfirm) {
                showError('两次输入的密码不一致');
                return;
            }

            if (password.length < 6) {
                showError('密码长度至少为6个字符');
                return;
            }

            setButtonLoading('registerBtn', 'registerBtnText', true);

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        role: 'user'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('注册成功！请登录');

                    // 切换到登录表单
                    setTimeout(() => {
                        registerForm.reset();
                        toggleForm.click();
                    }, 1500);
                } else {
                    showError(data.detail || '注册失败');
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                console.error('Register error:', error);
            } finally {
                setButtonLoading('registerBtn', 'registerBtnText', false);
            }
        });

        // 检查是否已登录
        window.addEventListener('load', () => {
            const token = localStorage.getItem('access_token');
            if (token) {
                // 验证 token 是否有效
                fetch('/api/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                })
                .then(response => {
                    if (response.ok) {
                        // 已登录，跳转到首页
                        window.location.href = '/';
                    }
                })
                .catch(error => {
                    console.error('Token validation error:', error);
                });
            }
        });
    </script>
</body>
</html>
