version: '3.8'

services:
  synergyai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synergyai_app
    ports:
      - "8000:8000"
    volumes:
      # 挂载数据目录以持久化 SQLite 数据库
      - ./data:/app/data
      # 挂载日志目录
      - ./logs:/app/logs
      # 开发模式下挂载源码（可选）
      # - ./core:/app/core
      # - ./templates:/app/templates
      # - ./ui:/app/ui
    environment:
      # 应用环境变量
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      # API 配置
      - API_HOST=0.0.0.0
      - API_PORT=8000
      # 可选：OpenAI API 配置（如果需要外部访问）
      # - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - synergyai_network

networks:
  synergyai_network:
    driver: bridge

volumes:
  synergyai_data:
    driver: local
