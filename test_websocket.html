<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebSocket 测试</title>
</head>
<body>
    <h1>WebSocket 连接测试</h1>
    <button onclick="testWebSocket()">测试创建新项目</button>
    <div id="output" style="margin-top: 20px; font-family: monospace;"></div>

    <script>
        const output = document.getElementById('output');

        function log(msg) {
            const p = document.createElement('p');
            p.textContent = msg;
            output.appendChild(p);
            console.log(msg);
        }

        let ws = null;

        function testWebSocket() {
            output.innerHTML = '';
            log('开始测试...');

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/chat`;
            log(`WebSocket URL: ${wsUrl}`);

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    log('✅ WebSocket 连接成功！');
                    log('发送创建会话请求...');

                    // 发送创建会话请求
                    ws.send(JSON.stringify({ type: 'create_session' }));
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    log('✅ 收到消息: ' + JSON.stringify(data, null, 2));

                    if (data.type === 'session_created') {
                        log('🎉 会话创建成功！ID: ' + data.session_id);
                    }
                };

                ws.onerror = (error) => {
                    log('❌ WebSocket 错误');
                    console.error('WebSocket error:', error);
                };

                ws.onclose = (event) => {
                    log('WebSocket 连接关闭');
                    log('代码: ' + event.code + ', 原因: ' + event.reason);
                };

            } catch (e) {
                log('❌ 异常: ' + e.message);
            }
        }

        // 页面加载完成后自动测试
        window.onload = () => {
            log('页面加载完成');
            log('当前地址: ' + window.location.href);
            setTimeout(testWebSocket, 1000);
        };
    </script>
</body>
</html>
