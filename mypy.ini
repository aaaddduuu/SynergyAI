[mypy]
# Specify the target Python version
python_version = 3.11

# Warn about unreachable code or redundant code
warn_unreachable = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_unused_configs = True
warn_return_any = True

# Disallow untyped defs and calls
disallow_untyped_defs = False
disallow_untyped_calls = False
disallow_incomplete_defs = False
check_untyped_defs = False

# None handling
strict_optional = True
no_implicit_optional = True

# Other strictness flags
strict_equality = True
strict_concatenate = True

# Error reporting
show_error_context = True
show_column_numbers = True
show_error_codes = True
pretty = True

# Additional checks
allow_redefinition = False

# Exclude directories
exclude = (?x)(
    tests/
    | automation/
    | venv/
    | env/
    | \.venv/
    | build/
    | dist/
    )

[mypy-langchain.*]
ignore_missing_imports = True

[mypy-langgraph.*]
ignore_missing_imports = True

[mypy-langchain_openai.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-zhipuai.*]
ignore_missing_imports = True

[mypy-langchain_anthropic.*]
ignore_missing_imports = True

[mypy-langchain_community.*]
ignore_missing_imports = True
